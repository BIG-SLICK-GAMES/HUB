<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BSG Login | Big Slick Games</title>
  <style>
    :root { color-scheme: dark; --ink:#fff; --soft:#c5cad3; --orange:#ff6a00; --gold:#ffb13b; --panel:rgba(13,17,25,.9); --line:rgba(255,106,0,.48); }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100svh; display:grid; place-items:center; font-family:Arial,Helvetica,sans-serif; color:var(--ink); background:radial-gradient(circle at 78% 8%, rgba(255,106,0,.28), transparent 30%), url("../assets/hub-bokeh-background.png?v=20260716a") center/cover fixed no-repeat, #070a10; }
    main { width:min(100% - 28px, 520px); padding:28px; border-radius:24px; background:linear-gradient(145deg, rgba(255,255,255,.06), transparent 40%), var(--panel); box-shadow:inset 0 0 0 1px var(--line), 0 28px 80px rgba(0,0,0,.44); text-align:center; }
    h1 { margin:0; font-size:clamp(38px,10vw,64px); line-height:.9; text-transform:uppercase; }
    p { margin:14px 0 22px; color:var(--soft); font-size:17px; font-weight:800; line-height:1.35; }
    a { display:inline-flex; min-height:44px; align-items:center; justify-content:center; padding:0 18px; border-radius:999px; background:linear-gradient(180deg,var(--gold),var(--orange)); color:#170700; font-size:12px; font-weight:950; text-decoration:none; text-transform:uppercase; }
  </style>
</head>
<body>
  <main>
    <h1>BSG Login</h1>
    <p>Opening the shared Big Slick Games sign-in screen.</p>
    <a id="loginLink" href="https://21-holdem.com/login">Continue To Login</a>
  </main>
  <script>
    const target = new URL('https://21-holdem.com/login');
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product');
    const returnUrl = params.get('return') || params.get('returnUrl');
    if (product) target.searchParams.set('product', product);
    if (returnUrl) target.searchParams.set('return', returnUrl);
    const link = document.getElementById('loginLink');
    link.href = target.toString();
    window.location.replace(target.toString());
  </script>
</body>
</html>
